<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Applebee’s Lealtad | Login</title>

  <link rel="icon" type="image/png" sizes="32x32" href="manzanas.png" />
  <link rel="apple-touch-icon" href="manzanas.png" />

  <link rel="stylesheet" href="cliente.css" />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e31837" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Applebee’s" />
</head>

<body>
  <main class="auth-page">
    <section class="auth-card">
      <div class="brand">
        <div class="brand-logo">
          <img src="manzanas.png" alt="Applebee's" />
        </div>
        <h1>Applebee’s</h1>
        <p>Programa de Lealtad</p>
      </div>

      <h2>Iniciar sesión</h2>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <div class="password-box">
  <input type="password" id="password" placeholder="Tu contraseña" />
  <span class="toggle-pass" onclick="togglePassword()">👁️</span>
</div>
      </div>

      <button class="btn-primary" onclick="loginCliente()">Entrar</button>

      <button id="installAppBtn" class="btn-install" onclick="instalarApp()" style="display:none;">
        📲 Instalar app
      </button>

      <p class="auth-link">
        ¿No tienes cuenta?
        <a href="registro.html">Crear cuenta</a>
      </p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

  <script src="firebase.js"></script>
  <script src="cliente.js"></script>
  <script src="install-app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js")
        .then(() => console.log("Service Worker registrado"))
        .catch(error => console.error("Error Service Worker:", error));
    }
  </script>
</body>
</html>
