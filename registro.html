<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta | Applebee’s Lealtad</title>
  <link rel="stylesheet" href="cliente.css" />
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">
      <div class="brand">
        <div class="brand-logo">A</div>
        <h1>Applebee’s</h1>
        <p>Crear cuenta de lealtad</p>
      </div>

      <h2>Registro</h2>

      <div class="form-group">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Nombre completo" />
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input type="tel" id="telefono" placeholder="6561234567" />
      </div>

      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com" />
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
      </div>

      <button class="btn-primary" onclick="registrarCliente()">Crear cuenta</button>

      <p class="auth-link">
        ¿Ya tienes cuenta?
        <a href="login.html">Iniciar sesión</a>
      </p>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>

  <script src="firebase.js"></script>
  <script src="cliente.js"></script>
</body>
</html>
